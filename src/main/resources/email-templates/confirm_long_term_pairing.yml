CONFIRM_LONG_TERM_PAIRING:
  subject: "You are paired up in WCC Mentorship Programme {{year}}"
  body: |
    <p>Dear {{mentor_name}} and {{mentee_name}},</p>
    
    <p>
    Welcome to the <strong> Women Coding Community Mentorship Programme {{year}}</strong>. We're delighted to have you both on board!
    </p>
    
    <p>
    Mentorship is a powerful tool for personal and professional growth, and we hope this relationship is a meaningful opportunity for you to learn, grow, and achieve your goals.
    </p>
    
    <p>
      <strong>Your Pairing:</strong>
    </p>
    
    <ul>
      <li>Mentor: {{mentor_name}} (<a href="mailto:{{mentor_email}}">{{mentor_email}}</a>)</li>
      <li>Mentee: {{mentee_name}} (<a href="mailto:{{mentee_email}}">{{mentee_email}}</a>)</li>
      <li>Mentor's Scheduling Link: (<a href="{{mentor_calendly_link}}">{{mentor_calendly_link}}</a>)</li>
      <li>Google Meet Link: (<a href="{{meeting_link}}">{{meeting_link}}</a>)</li>
    </ul>
    
    <p>
    We've provided the Google Meet link above for your sessions so you (please ignore the corresponding calendar invite). If you use the provided meeting link, you can choose whether to record, transcribe, or take notes during your calls. Please be aware that if you choose to record or keep notes, WCC will automatically receive a copy. This information is fully confidential and will not be shared with anyone. <strong>Note:</strong> You're welcome to use a personal meeting link or alternative communication method instead if you prefer.
    </p>
    
    <p>
    The programme will run from <strong>May to October</strong>. The frequency and format of the meetings will be decided by you during your initial meeting. We recommend at least <strong>two mentoring sessions per month</strong> (45 minutes to 1 hour each) to build a meaningful relationship.
    </p>
    
    <p>
    <strong>Getting Started</strong>
    </p>
    
    <ol>
      <li>Schedule your initial meeting with your mentor. {{mentor_name}}, please take the lead on booking this first session using the mentor’s scheduling link.</li>
      <li>Define specific and measurable goals for the mentorship relationship.</li>
      <li>Develop an action plan to achieve those goals.</li>
      <li>Schedule regular check-ins to monitor progress and adjust the action plan as needed.</li>
    </ol>
    
    <p>We also encourage you to stay in touch between sessions through your preferred channel (Slack or email) to get the most out of the programme.</p>
    
    <p>
    <strong>Helpful Resources</strong>
    </p>
    
    <p>
    To support you along the way:
    </p>
    
    <ul>
        <li><a href="https://mentorship.womencodingcommunity.com/mentorship/resources">Mentorship Resources</a></li>
        <li><a href="https://mentorship.womencodingcommunity.com/mentorship/code-of-conduct">Code of Conduct for Mentors and Mentees</a></li>
    </ul>
    
    <p>We hope these resources help you make the most of this mentorship opportunity. If you have any questions or concerns, please don’t hesitate to reach out to us via email or the Slack channel #mentorship.</p>
    <p>Wishing you a rewarding mentorship journey!</p>
    
    <p>
    {{teamEmailSignature}}
    </p>
    
    <p>[Automated Message]</p>