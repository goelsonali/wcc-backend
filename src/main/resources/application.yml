spring:
  application:
    name: wcc-backend
  profiles:
    active: default

  datasource:
    url: jdbc:postgresql://localhost:5432/wcc
    username: postgres
    password: MFpFnhhICniFNPA
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@email.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

backend:
  app:
    url: ${SPRING_APP_BASE_URL:http://localhost:8080}

mentorship:
  validation:
    enabled: false

notification:
  mentorship-email: mentorship@womencodingcommunity.com
  mentor-profile-url: https://mentorship.womencodingcommunity.com/mentorship/mentors?keyword=
  volunteer-url: https://www.womencodingcommunity.com/volunteer

logging:
  level:
    org:
      springframework:
        jdbc: DEBUG
      flywaydb: DEBUG

security:
  enabled: true
  token:
    ttl-minutes: 60
  api:
    key: local

file:
  storage:
    directory: data

app:
  cors:
    allowed-origins: http://localhost:3000,https://localhost:3000
  email:
    team-signature: |
      Best Regards<br>
      <strong>Mentorship Programme Team</strong><br>
      <a href="https://www.womencodingcommunity.com/">Women Coding Community</a><br>
      <br>
      <img src="https://www.womencodingcommunity.com/assets/images/logo.svg" alt="Women Coding Community Logo" width="50"><br>
      <br>
      Follow us:<br>
      <a href="https://www.linkedin.com/company/womencodingcommunity/">LinkedIn</a> |
      <a href="https://www.youtube.com/@womencodingcommunity">YouTube</a> |
      <a href="https://www.meetup.com/women-coding-community">Meetup</a> |
      <a href="https://github.com/Women-Coding-Community">GitHub</a> |
      <a href="https://join.slack.com/t/womencodingcommunity/shared_invite/zt-2hpjwpx7l-rgceYBIWp6pCiwc0hVsX8A">Slack</a> |
      <a href="mailto:mentorship@womencodingcommunity.com">email</a>
  reset-password:
    base-url: ${APP_RESET_PASSWORD_BASE_URL:http://localhost:3000}
    ttl-minutes: 7200
    reset-path: /reset-password

  seed:
    enabled: true
    users:
      - enabled: true
        email: admin@wcc.dev
        password: wcc-admin
        full-name: Platform Admin
        roles: [ ADMIN ]
        member-types: [ MEMBER ]

storage:
  type: local
  google-drive:
    credentials-json:
  folders:
    main-folder: folder-id
    resources-folder: folder-id
    events-folder: folder-id
    mentors-folder: folder-id
    mentors-profile-folder: folder-id
    images-folder: folder-id

management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: "health,info,metrics,env,loggers"

springdoc:
  show-actuator: true
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    tagsSorter: alpha
    operations-sorter: alpha
  paths-to-match: /api/**, /actuator/**
